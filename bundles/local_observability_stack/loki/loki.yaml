auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: false

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  reject_old_samples: false
  max_query_length: 721h
  max_global_streams_per_user: 10000
  ingestion_rate_mb: 64
  ingestion_burst_size_mb: 128
  # DefenseClaw audit/gateway events can carry large prompts, judge
  # bodies, and raw HTTP request/response payloads — especially when
  # `privacy.disable_redaction=true` is set on the sidecar. Defaults
  # (256 KiB max_line_size, 64 KiB max_structured_metadata_size) cause
  # silent drops on those payloads, breaking audit fidelity. We raise
  # both ceilings and switch from "drop" to "truncate" so an oversize
  # entry still lands in Loki (with a `[...]` tail) and the
  # corresponding span / SQLite audit row stays correlatable.
  #
  # The OTel Collector's `transform/loki-payload-cap` processor caps
  # bodies at 200 KiB and per-attribute strings at 8 KiB before the
  # write reaches Loki, so these limits are headroom, not the primary
  # defense. They should remain well above the collector caps so any
  # future overflow is observable via the
  # DefenseClawLokiIngestOverflow alert rather than a silent drop.
  max_line_size: 1MB
  max_line_size_truncate: true
  max_structured_metadata_size: 256KB
  max_structured_metadata_entries_count: 256

ingester:
  chunk_idle_period: 2m
  chunk_retain_period: 30s
  max_chunk_age: 30m

ruler:
  alertmanager_url: http://localhost:9093

analytics:
  reporting_enabled: false
