# DefenseClaw-facing OpenTelemetry Collector config.
#
# Pipelines:
#   traces  -> tempo  (OTLP gRPC on tempo:4317)
#   metrics -> prometheus (remote-write on prometheus:9090)
#   logs    -> loki   (OTLP HTTP on loki:3100/otlp)
#
# Every signal is also fanned out to the built-in "debug" exporter so
# operators can `docker logs defenseclaw-otel-collector` and see raw
# OTLP payloads while iterating on the sidecar contract. Set the
# verbosity to `basic` in production to avoid noise.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:*"
            - "http://127.0.0.1:*"

processors:
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: 5s

  # Defense-in-depth resource enrichment so every signal carries the
  # service.namespace=defenseclaw label even if the sidecar forgets to
  # set it. The `insert` action keeps the sidecar-supplied value when
  # present.
  resource:
    attributes:
      - key: service.namespace
        value: defenseclaw
        action: insert
      - key: deployment.environment
        value: local-dev
        action: insert

  # Drop payload bodies that downstream is too noisy to index — redaction
  # is still the sidecar's responsibility, this is belt-and-braces.
  attributes/strip-bodies:
    actions:
      - key: audit.details
        action: delete

  # Loki-only payload cap. Applied AFTER attributes/strip-bodies in the
  # logs pipeline, BEFORE the otlphttp/loki exporter. Tempo/Prometheus
  # and any per-sink OTLP audit exporter (configured in
  # internal/audit/sinks/otlp_logs.go on the sidecar side) deliberately
  # do NOT include this processor — they receive the full payload so
  # forensic tooling and a downstream SIEM keep full fidelity.
  #
  # Why this exists:
  #   When `privacy.disable_redaction=true` is set on the sidecar, the
  #   gateway/audit log records carry raw prompts, raw model responses,
  #   judge bodies, and full request/response HTTP payloads. A single
  #   long file pasted into a chat completion can produce a >500 KiB
  #   body and >64 KiB of OTel attributes, which trips Loki's
  #   `max_line_size` (default 256 KiB) and
  #   `max_structured_metadata_size` (default 64 KiB) limits and the
  #   entry is silently dropped — breaking audit fidelity.
  #
  # What it does:
  #   1. Drops the largest free-form attributes wholesale. They live in
  #      the SQLite audit DB and (optionally) a SIEM via the audit
  #      OTLP-logs sink, which is the right destination for
  #      forensic-scale payloads.
  #   2. Truncates every remaining string-valued attribute to 8 KiB so
  #      no single attribute alone can blow the 256 KiB structured
  #      metadata ceiling, even with hundreds of attributes.
  #   3. Caps the log body at 200 KiB so it stays well under Loki's
  #      raised 1 MiB max_line_size limit.
  #
  # Loki's `max_line_size_truncate: true` is the safety net for any
  # value that escapes these caps; the alert
  # `DefenseClawLokiIngestOverflow` (prometheus/rules/alerts.yml) makes
  # those escapes observable.
  transform/loki-payload-cap:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - delete_key(attributes, "audit.details")
          - delete_key(attributes, "defenseclaw.judge.raw_response")
          - delete_key(attributes, "defenseclaw.llm.raw_request_body")
          - delete_key(attributes, "defenseclaw.llm.raw_response_body")
          - delete_key(attributes, "gen_ai.prompt")
          - delete_key(attributes, "gen_ai.completion")
          - truncate_all(attributes, 8192)
          - set(body, Substring(body, 0, 200000)) where IsString(body) and Len(body) > 200000

exporters:
  # Traces -> Tempo.
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Metrics -> Prometheus remote write.
  prometheusremotewrite/prometheus:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
    remote_write_queue:
      enabled: true
      queue_size: 10000

  # Logs -> Loki via native OTLP.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Local tap so operators can see raw OTLP frames while iterating.
  # Switch to verbosity=basic to shrink the log volume.
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

  # Prometheus-format exporter so Prometheus can scrape the collector
  # directly if remote_write is ever disabled.
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheusremotewrite/prometheus, prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [resource, attributes/strip-bodies, transform/loki-payload-cap, batch]
      exporters: [otlphttp/loki, debug]
