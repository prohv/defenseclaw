global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Self-metrics from the OTel Collector.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: otel-collector

  # Metrics exported by the collector's prometheus exporter (fallback
  # path when remote_write is disabled).
  - job_name: otel-collector-export
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: defenseclaw-prometheus-export

  # Loki self-metrics. Exposes loki_distributor_lines_received_total
  # and loki_discarded_samples_total{reason=...} which the
  # `defenseclaw.observability_pipeline` alert group uses to detect
  # silent log drops (e.g. line_too_long, structured_metadata_too_big)
  # before they hide audit events from operators.
  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki
