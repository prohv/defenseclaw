# Local pattern set consumed by internal/gateway/guardrail.go via the
# rule-pack loader. The bundled defaults below mirror the compiled-in
# baseline 1:1 — see internal/gateway/guardrail.go::default* slices.
# Editing this file overrides individual fields wholesale for this
# profile (e.g. emptying `secrets:` clears secret triage entirely;
# extending `injection:` adds operator-specific phrases).
#
# Three-state semantics:
#   - omit a key entirely  → retain compiled-in default for that family
#   - field: []            → operator explicitly cleared the field
#   - field: [...]         → operator override; replaces the default
#
# An identity-test in internal/gateway TestLocalPatternsDefaultsParity
# verifies this file produces the same in-memory set as the compiled-in
# defaults, so drift between the YAML and the Go source is caught at
# CI time rather than at incident-time.
version: 1

injection:
  - "ignore previous"
  - "ignore all instructions"
  - "ignore above"
  - "ignore all previous"
  - "ignore your instructions"
  - "ignore prior"
  - "disregard previous"
  - "disregard all"
  - "disregard your"
  - "forget your instructions"
  - "forget all previous"
  - "override your instructions"
  - "override all instructions"
  - "you are now"
  - "pretend you are"
  - "jailbreak"
  - "do anything now"
  - "dan mode"
  - "developer mode enabled"

injection_regexes:
  - 'ignore\s+(?:all\s+)?(?:previous|prior|above|your)\s+(?:instructions|rules|directives|guidelines)'
  - 'disregard\s+(?:all\s+)?(?:previous|prior|above|your)\s+(?:instructions|rules|directives|guidelines)'
  - '(?:share|reveal|show|print|output|dump|repeat|give\s+me)\s+(?:your|the)\s+(?:system\s+)?(?:prompt|instructions|rules)'
  - '(?:what\s+(?:is|are)\s+your\s+(?:system\s+)?(?:prompt|instructions|rules))'
  - 'act\s+as\b'
  - 'bypass\s+(?:your|the|my|all|any)\s+(?:filter|guard|safe|restrict|rule|instruction)'

pii_requests:
  - "find their ssn"
  - "find my ssn"
  - "look up their ssn"
  - "retrieve their ssn"
  - "get their ssn"
  - "get my ssn"
  - "social security number"
  - "mother's maiden name"
  - "mothers maiden name"
  - "credit card number"
  - "find their password"
  - "look up their password"
  - "find their email"
  - "look up their email"
  - "date of birth"
  - "bank account number"
  - "passport number"
  - "driver's license"
  - "drivers license"

pii_data_regexes:
  - '\b\d{3}-\d{2}-\d{4}\b'
  - '\b(?:4\d{3}|5[1-5]\d{2}|3[47]\d{2}|6(?:011|5\d{2}))[- ]?\d{4}[- ]?\d{4}[- ]?\d{4}\b'

secrets:
  - "sk-ant-"
  - "sk-proj-"
  - "-----begin rsa"
  - "-----begin private"
  - "-----begin openssh"
  - "ghp_"
  - "gho_"
  - "github_pat_"

exfiltration:
  - "/etc/passwd"
  - "/etc/shadow"
  - "base64 -d"
  - "base64 --decode"
  - "exfiltrate"
  - "exfil"
  - "send to my server"
  - "curl http"
