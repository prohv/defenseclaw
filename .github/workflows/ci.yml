name: CI

on:
  push:
    branches: [main]
  # Run CI on every pull request regardless of base branch so PRs that
  # target an integration branch (not just main) are gated too — otherwise
  # their checks (incl. the Windows hook path) never execute until the
  # change reaches a main-targeting PR.
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Catches drift between the four in-repo version sources (Makefile,
      # pyproject.toml, cli/__init__.py, package.json) before it can ship
      # in a release. The release workflow restamps from the git tag, but
      # PRs still need to keep the in-repo defaults in sync so local dev
      # builds (`make dist`) produce artifacts whose names match what
      # install.sh / `defenseclaw upgrade` will look up at the next tag.
      - run: make check-version-sync

  upgrade-manifest:
    name: Upgrade Manifest Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Ensures future releases carry a release-owned migration contract
      # before the release workflow publishes upgrade-manifest.json.
      - run: make check-upgrade-manifest

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make go-lint

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make go-test-cov
      - uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

  go-build:
    name: Go Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make gateway-cross GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        with:
          name: defenseclaw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: defenseclaw-${{ matrix.goos }}-${{ matrix.goarch }}

  python-lint-test:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync
      - run: make py-lint
      - run: make cli-test-cov
      - uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage-py.xml

  connector-matrix:
    name: Connector Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - uses: astral-sh/setup-uv@v8.1.0
      - run: make plugin
      - run: make dev-pycli
      - run: make connector-matrix-test

  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync
      - run: uv pip install pip pip-audit
      # TODO: Remove --ignore-vuln CVE-2026-4539 once pygments >= 2.19.3 is released
      # CVE-2026-4539: Low severity ReDoS in AdlLexer (local attack vector only)
      # TODO: Remove --ignore-vuln CVE-2026-3219 once a fixed pip version is
      # released. No fix version available as of 2026-04-24. pip is only used
      # by pip-audit itself, not by DefenseClaw at runtime.
      # TODO: Remove --ignore-vuln CVE-2026-3219 once a fixed pip is released.
      # CVE-2026-3219: pip's interpretation conflict with concatenated tar/ZIP
      # archives. Medium severity; impacts only attacker-supplied package
      # archives. We install exclusively from PyPI via uv with locked hashes
      # (uv.lock), so this attack surface is not exposed in CI or runtime.
      #
      # TODO: Remove --ignore-vuln PYSEC-2026-196 once the CI base image ships
      # pip >= 26.1.2. Same rationale as CVE-2026-3219: pip is only used by
      # pip-audit here, not by DefenseClaw at runtime, and we install
      # exclusively from PyPI via uv with locked hashes (uv.lock).
      #
      # Previously ignored, now fixed by bumping cisco-ai-skill-scanner to
      # >=2.0.11 + overriding starlette>=1.0.1 and python-dotenv>=1.2.2 in
      # pyproject.toml:
      #   - PYSEC-2026-161 (GHSA-86qp-5c8j-p5mr, starlette host-header)
      #   - CVE-2026-28684 (python-dotenv arbitrary file read)
      # aiohttp>=3.14.0 (CVE-2026-34993, CVE-2026-47265) and pyjwt>=2.13.0
      # (PYSEC-2026-175/177/178/179) are likewise pinned in pyproject.toml.
      - run: uv run pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-3219 --ignore-vuln PYSEC-2026-196

  ts-build-test:
    name: TypeScript Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make ts-test

  ts-audit:
    name: npm Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/defenseclaw
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev

  rego-test:
    name: Rego Policy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - run: make rego-test

  schema-parity:
    name: Schema & Parity Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - uses: astral-sh/setup-uv@v8.1.0
      - run: make plugin
      - run: make dev-pycli
      - run: make check

  make-test:
    name: make test (unified)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - uses: astral-sh/setup-uv@v8.1.0
      - run: make plugin
      # dev-pycli installs the [dev] group (pytest, jsonschema, ruff)
      # which `make test → cli-test` indirectly needs at import time:
      # several cli/tests/*.py files use pytest fixtures/parametrize
      # and `python -m unittest discover` aborts on the first failed
      # import. The non-dev `make pycli` target only installs runtime
      # deps and broke this job after the S4.1/S4.2 connector_paths
      # tests landed.
      - run: make dev-pycli
      - run: make test

  windows-hook-path:
    name: Windows Hook Path
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@v8.1.0
      # The gateway embeds the OpenClaw extension tree, normally generated
      # by `make sync-openclaw-extension`. Windows is hook-only and needs no
      # OpenClaw plugin, so drop the same `.placeholder` marker that target
      # writes when extensions/defenseclaw/dist is absent. Done in bash
      # (Git Bash ships on the runner) to avoid GNU make's flaky shell
      # resolution on Windows.
      - name: Generate OpenClaw extension placeholder
        shell: bash
        run: |
          set -euo pipefail
          embed_dir=internal/gateway/connector/openclaw_extension
          mkdir -p "$embed_dir"
          printf '%s\n' \
            "OpenClaw extension not built." \
            "Run 'make extensions' (or 'make plugin') to populate the embedded tree." \
            > "$embed_dir/.placeholder"
      # Prove the Windows hook surfaces compile and vet cleanly.
      - name: Go build (hook surfaces + binary)
        run: go build ./internal/gateway/connector/... ./internal/cli/... ./internal/daemon/... ./internal/notify/... ./cmd/defenseclaw
      - name: Go vet (hook surfaces)
        run: go vet ./internal/gateway/connector/... ./internal/cli/... ./internal/daemon/... ./internal/notify/...
      # Prove every test binary on the hook surfaces builds on Windows
      # (compiles all test files, runs zero tests).
      - name: Go test-compile (all hook-surface tests build on Windows)
        run: go test -run "^$" ./internal/gateway/connector/... ./internal/cli/... ./internal/daemon/... ./internal/notify/...
      # Execute the native Go hook decision engine end to end — this is the
      # whole Windows hook path (stdin cap, token, HTTP, per-connector
      # output/exit, fail-open/closed, Codex/Claude block schema).
      - name: Go test - native hook engine
        run: go test ./internal/gateway/connector/hookexec/...
      # Execute the per-OS connector capability model and hook-wiring tests.
      - name: Go test - connector capability + hook wiring
        run: go test ./internal/gateway/connector/ -run "ProxyConnector|IsProxyConnector|ConnectorSupportedOnOS|RegistryNamesFilter|HookInvocationCommand|ShellWordPassesNativeCommandThrough|BuildCodexHooksTableHashesTheCommand|IsOwnedHookRecognizesNativeCommand"
      # Execute the native `defenseclaw hook` entrypoint + sidecar resolution.
      - name: Go test - hook entrypoint
        run: go test ./internal/cli/ -run "BuildHookOptions|ReadHookSidecar|HookCommandRegistered"
      - name: Sync Python env
        shell: bash
        run: uv sync
      # Execute the per-OS connector gating and the Windows config-lock
      # contention test natively on Windows.
      - name: Python test - platform gating + config lock
        shell: bash
        run: uv run python -m pytest cli/tests/test_platform_support.py cli/tests/test_config_lock_mutex.py -q
